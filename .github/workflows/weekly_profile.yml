name: Weekly profile update

on:
  schedule:
    - cron: "30 17 * * 0"   # 5:30 PM UTC Sunday = 11:00 PM IST Sunday
  workflow_dispatch:

jobs:
  rewrite-profiles:
    runs-on: ubuntu-latest

    permissions:
      contents: write          # Needed to commit updated profiles back to this repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rewrite all active user profiles
        run: |
          python - <<'EOF'
          import yaml
          import logging
          logging.basicConfig(level=logging.INFO, format="%(levelname)s  %(message)s")
          from feedback.rewrite_profile import rewrite_profile
          registry = yaml.safe_load(open("users/registry.yaml"))
          for user in registry.get("users", []):
              if user.get("active", True):
                  uid = user["id"]
                  print(f"Rewriting profile for {uid}...")
                  try:
                      rewrite_profile(user_id=uid)
                  except Exception as e:
                      print(f"  WARN: {e}")
          EOF

      - name: Commit updated profiles
        run: |
          git config user.name "digest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add users/profiles/
          git diff --staged --quiet || git commit -m "chore: weekly profile updates $(date +%Y-%m-%d)"
          git push

    env:
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
