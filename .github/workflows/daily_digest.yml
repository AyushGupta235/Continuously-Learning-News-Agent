name: Daily news digest

on:
  schedule:
    - cron: "30 3 * * *"    # 3:30 AM UTC = 9:00 AM IST
  workflow_dispatch:          # Manual trigger for testing
    inputs:
      dry_run:
        description: "Skip email delivery (write preview HTML only)"
        type: boolean
        default: false
      users:
        description: "Comma-separated user IDs to run (leave blank for all active)"
        type: string
        default: ""

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run multi-user digest pipeline
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.users }}" ]; then ARGS="$ARGS --users ${{ inputs.users }}"; fi
          python -m pipeline.fan_out $ARGS

    env:
      XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
      DIGEST_EMAIL:       ${{ secrets.DIGEST_EMAIL }}
      TRACKER_BASE_URL:   ${{ vars.TRACKER_BASE_URL }}
